name: timeline-editor
description: 基于时间轴的编辑器 — 支持 Group/Track/Clip 三层数据结构、拖拽排序、折叠展开、缩放和平移
status: ready
artifacts:
  - id: proposal
    file: proposal.md
    type: proposal
    status: done
  - id: design
    file: design.md
    type: design
    status: done
    dependsOn: [proposal]
  - id: tasks
    file: tasks.md
    type: tasks
    status: done
    dependsOn: [design]
